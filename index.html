<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Farhad Pashayev — QA Engineer</title>
  <meta name="description" content="Senior QA Automation Engineer specialising in E2E, API, and performance testing." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ── CSS Variables ── */
    :root {
      --accent:       #32CD32;
      --accent-dim:   rgba(50, 205, 50, 0.14);
      --accent-glow:  rgba(50, 205, 50, 0.35);
      --bg:           #07090c;
      --surface:      #0b0e13;
      --border:       rgba(255,255,255,0.07);
      --border-strong:rgba(255,255,255,0.12);
      --text:         #e8eaf0;
      --text-dim:     #9199a8;
      --text-mute:    #4a5260;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; }
    input, textarea { font-family: inherit; }

    /* ── Scroll-reveal animations ── */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .reveal.in {
      opacity: 1;
      transform: none;
    }
    .stagger {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }
    .stagger.in {
      opacity: 1;
      transform: none;
    }

    /* ── Grid noise texture ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

    /* ── Chart canvas ── */
    canvas { display: block; }

    /* ── Utility ── */
    #root { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + ReactDOM (production UMD) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone for JSX transform -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Load JSX files manually to guarantee classic runtime and single execution -->
  <script>
    (async () => {
      const files = ['icons','data','skills','nav','hero','projects','dashboard','tips','contact','tweaks','app'];
      for (const f of files) {
        const res = await fetch(`src/${f}.jsx`);
        const jsx = await res.text();
        const { code } = Babel.transform(jsx, {
          presets: [['react', { runtime: 'classic' }]],
          filename: f + '.jsx',
        });
        const el = document.createElement('script');
        el.textContent = `(function(){\n${code}\n})();`;
        document.head.appendChild(el);
      }
    })();
  </script>
</body>
</html>
